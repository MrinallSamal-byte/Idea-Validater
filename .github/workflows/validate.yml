name: validate
on:
  push:
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.x" }
      - name: Validate JSON manifests
        run: |
          for f in .claude-plugin/plugin.json .claude-plugin/marketplace.json package.json gemini-extension.json hooks/hooks.json; do
            python3 -c "import json,sys;json.load(open('$f'));print('ok',sys.argv[1])" "$f"
          done
      - name: Validate skill frontmatter
        run: |
          for f in skills/*/SKILL.md; do
            head -1 "$f" | grep -q '^---' && echo "ok $f" || (echo "BAD frontmatter: $f"; exit 1)
          done
      - name: Rule adapters in sync
        run: bash scripts/check-rule-copies.sh
      - name: Run benchmark harness
        run: python3 benchmarks/score.py
